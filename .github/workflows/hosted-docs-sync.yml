name: Sync hosted-pmxt docs

on:
  repository_dispatch:
    types: [hosted-docs-update]

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Write manifest
        run: echo '${{ toJson(github.event.client_payload.manifest) }}' > .doc-manifest.json

      - name: Apply hosted docs
        run: node scripts/apply-hosted-manifest.js .doc-manifest.json

      - name: Create PR if changed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet docs/; then
            echo "No docs changes — nothing to do."
            exit 0
          fi

          BRANCH="sync/hosted-docs"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add docs/
          git commit -m "docs: sync hosted-pmxt custom endpoints"
          git push -u origin "$BRANCH" --force

          EXISTING=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already open — updated branch."
          else
            gh pr create \
              --head "$BRANCH" \
              --title "docs: sync hosted-pmxt custom endpoints" \
              --body "$(cat <<'EOF'
          Auto-generated from hosted-pmxt doc manifest.

          Updates:
          - OpenAPI paths for custom hosted endpoints
          - docs.json navigation
          - Rate limit tables
          - Catalog venue list
          EOF
          )"
          fi
